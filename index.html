      --text-secondary: #86868b;
      --text-muted: #515154;
      --accent-glow: #38bdf8;
      --accent-emerald: #10b981;
      --radius-sm: 8px;
      --radius-md: 18px;
      --radius-lg: 28px;
      --radius-pill: 9999px;
      --shadow-apple: 0 20px 40px rgba(0, 0, 0, 0.8);
      --font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;

      color: var(--text-primary);
      font-family: var(--font-family);
      overflow-x: hidden;
      line-height: 1.45;
      scroll-behavior: smooth;
    }

    /* Scroll Snap Full Page Experience */
    .snap-container {
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
      height: 100vh;
      width: 100vw;
    }

    .snap-section {
      scroll-snap-align: start;
      scroll-snap-stop: always;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      padding: 100px 24px 60px 24px;
    }

    /* Tactile Response */
    button, input, select { touch-action: manipulation; }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
      transition: transform 120ms cubic-bezier(0.2, 0.8, 0.4, 1), background-color 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
    }
    button:active { transform: scale(0.97) !important; }

    .container { max-width: 1100px; width: 100%; margin: 0 auto; }
    
    /* Apple Monolithic Glass Panel */
    .glass-panel {
      background: var(--bg-card);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-apple);
      transition: border-color 0.4s ease, transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-panel:hover { border-color: var(--border-glass-bright); }

      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 1000;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glass);

    .brand-logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 1.2rem; color: #fff; text-decoration: none; letter-spacing: -0.5px; }
    
    .brand-halo-icon {
      width: 32px;
      height: 32px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .brand-halo-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px solid var(--accent-glow);
      box-shadow: 0 0 15px var(--accent-glow);
      animation: haloRotate 6s linear infinite;
    }

    @keyframes haloRotate {
      0% { transform: rotate(0deg) scale(0.95); opacity: 0.8; }
      50% { transform: rotate(180deg) scale(1.05); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.95); opacity: 0.8; }
    }

    .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
    .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s ease; }
    .nav-link:hover { color: #fff; }

    .lang-selector {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-glass);
      color: var(--text-primary);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .lang-select-input { background: transparent; border: none; color: inherit; font-weight: 600; outline: none; cursor: pointer; }

    .btn-apple-primary {
      background: #ffffff;
      color: #000000;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 10px 22px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: background-color 0.2s ease, transform 0.2s ease;

    .btn-apple-primary:hover { background: #e5e5e7; transform: translateY(-1px); }

    .btn-apple-secondary {
      background: rgba(255, 255, 255, 0.06);

      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 10px 22px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;

      -webkit-text-fill-color: transparent;

    .titanium-subtitle {

      padding: 6px 18px;

      font-weight: 600;

    footer { padding: 40px 0; text-align: center; border-top: 1px solid var(--border-glass); color: var(--text-muted); font-size: 0.82rem; width: 100%; }

      .nav-links { display: none; }
      .navbar { padding: 16px 20px; }
      .snap-section { padding-top: 120px; }

      const [isPlaying, setIsPlaying] = React.useState(false);
      const [activeStep, setActiveStep] = React.useState(0);
      const [missedCalls, setMissedCalls] = React.useState(3);
      const [formData, setFormData] = React.useState({ name: '', business: '', phone: '', email: '' });

      React.useEffect(() => {
        const userLang = navigator.language || '';
        if (userLang.startsWith('uk') || userLang.startsWith('ua')) setLang('ua');
        else if (userLang.startsWith('ru')) setLang('ru');
        else if (userLang.startsWith('en')) setLang('en');
        else setLang('pl');
      }, []);

      const t = translations[lang] || translations.pl;

        let interval = null;
        if (isPlaying) {
          interval = setInterval(() => {
            setActiveStep((prev) => {
              if (prev >= t.simulator.dialog.length - 1) {
                setIsPlaying(false);
                return prev;
              }
              return prev + 1;
            });
          }, 3500);
        }
        return () => clearInterval(interval);
      }, [isPlaying, t.simulator.dialog.length]);

      const togglePlay = () => {
        if (!isPlaying && activeStep >= t.simulator.dialog.length - 1) setActiveStep(0);
        setIsPlaying(!isPlaying);
      };

      const lostMonthly = missedCalls * 80 * 22;

        e.preventDefault();
        setSubmitted(true);
      };

              <div className="hero-cta-group">
                <a href="#contact-form" className="btn-apple-primary">{t.hero.ctaPrimary} →</a>
                <a href="#simulator" className="btn-apple-secondary">{t.hero.ctaSecondary}</a>
              </div>
              <div className="stats-grid">
                <div className="glass-panel stat-card"><div className="stat-value">{t.hero.stat1Val}</div><div className="stat-label">{t.hero.stat1Text}</div></div>
                <div className="glass-panel stat-card"><div className="stat-value">{t.hero.stat2Val}</div><div className="stat-label">{t.hero.stat2Text}</div></div>
                <div className="glass-panel stat-card"><div className="stat-value">{t.hero.stat3Val}</div><div className="stat-label">{t.hero.stat3Text}</div></div>

            </div>

              </div>
            </div>
          </section>

          {/* Section 5: Pricing */}
          <section className="snap-section" id="pricing">
            <div className="container">
              <div className="section-header">
                <div className="tag-label">{t.pricing.tag}</div>
                <h2 className="section-title">{t.pricing.title}</h2>
              </div>
              <div className="glass-panel pricing-card" style={{ margin: '0 auto' }}>

                <ul className="pricing-features">
                  {t.pricing.features.map((feat, idx) => (
                    <li key={idx} className="pricing-feature-item">✓ {feat}</li>
                  ))}

                <a href="#contact-form" className="btn-apple-primary" style={{ width: '100%', justifyContent: 'center', padding: '14px 24px', fontSize: '1rem' }}>{t.pricing.cta}</a>
              </div>
            </div>
          </section>

          {/* Section 6: Form & Footer */}
          <section className="snap-section" id="contact-form">
            <div className="container">
              <div className="glass-panel form-card" style={{ margin: '0 auto 40px auto' }}>
                <div className="section-header" style={{ marginBottom: 32 }}>
                  <div className="tag-label">{t.form.tag}</div>
                  <h2 className="section-title">{t.form.title}</h2>
                  <p style={{ color: 'var(--text-secondary)', marginTop: 8 }}>{t.form.subtitle}</p>
                </div>
                {submitted ? (
                  <div className="success-banner">
                    <h3 style={{ fontSize: '1.4rem', fontWeight: 800, marginBottom: 8, color: '#fff' }}>{t.form.successTitle}</h3>
                    <p style={{ color: 'var(--text-secondary)' }}>{t.form.successDesc}</p>
                  </div>
                ) : (
                  <form onSubmit={handleSubmit}>
                    <div className="form-group">
                      <label className="form-label">{t.form.nameLabel}</label>
                      <input type="text" required className="form-input" placeholder={t.form.namePlaceholder} value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.form.businessLabel}</label>
                      <input type="text" required className="form-input" placeholder={t.form.businessPlaceholder} value={formData.business} onChange={(e) => setFormData({...formData, business: e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.form.phoneLabel}</label>
                      <input type="tel" required className="form-input" placeholder={t.form.phonePlaceholder} value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} />
                    </div>
                    <div className="form-group">
                      <label className="form-label">{t.form.emailLabel}</label>
                      <input type="email" required className="form-input" placeholder={t.form.emailPlaceholder} value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} />
                    </div>
                    <button type="submit" className="btn-apple-primary" style={{ width: '100%', justifyContent: 'center', padding: '14px 24px', fontSize: '1rem' }}>{t.form.submit} →</button>
                  </form>
                )}
              </div>

              <footer>
                <p style={{ marginBottom: 6 }}>{t.footer.rights}</p>
                <p style={{ fontSize: '0.75rem', color: 'var(--text-muted)' }}>{t.footer.rodo}</p>
              </footer>
            </div>
          </section>
        </div>

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
